services:
  - type: web
    name: aria-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: USE_GROQ
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "https://new-aria-s6oj.vercel.app,https://new-aria-1.onrender.com"
